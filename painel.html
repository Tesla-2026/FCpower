<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADMIN MASTER | GITHUB</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --verde: #22c55e; --vermelho: #ef4444; --bg: #0f172a; --card: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #f1f5f9; padding: 10px; }
        
        #notif { position: fixed; top: 10px; left: 50%; transform: translateX(-50%) translateY(-200%); background: var(--verde); color: white; padding: 15px; border-radius: 8px; transition: 0.5s; z-index: 10000; width: 90%; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .show { transform: translateX(-50%) translateY(0) !important; }

        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-top: 4px solid var(--verde); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input, button { padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #334155; width: 100%; font-weight: bold; }
        button { cursor: pointer; color: white; border: none; text-transform: uppercase; font-size: 11px; }
        .btn-v { background: var(--verde); }
        .btn-r { background: var(--vermelho); }
        .btn-b { background: #3b82f6; }
        
        .table-container { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 8px; background: #0f172a; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; font-size: 11px; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; }
        
        .img-preview { width: 50px; height: 50px; object-fit: cover; border: 2px solid var(--verde); border-radius: 6px; cursor: zoom-in; }

        #modal-img { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; justify-content: center; align-items: center; flex-direction: column; }
        #modal-img img { max-width: 90%; max-height: 80%; border: 3px solid white; border-radius: 10px; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 30px; color: white; cursor: pointer; }

        #login-box { text-align: center; margin-top: 20vh; padding: 20px; }
        .grid-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        
        /* Estilo para info de equipe */
        .equipa-box { display: flex; justify-content: space-between; background: #0f172a; padding: 10px; border-radius: 8px; margin: 10px 0; border-left: 3px solid #3b82f6; }
    </style>
</head>
<body>

    <div id="notif">Ação Processada com Sucesso!</div>

    <div id="modal-img" onclick="fecharModal()">
        <span class="close-modal">&times;</span>
        <img id="img-full" src="">
    </div>

    <div id="login-box">
        <h2 style="letter-spacing: 2px;">PAINEL GITHUB ADMIN</h2>
        <input type="password" id="m-key" placeholder="Introduza a Chave ABS...">
        <button class="btn-v" onclick="verificarAcesso()">ENTRAR NO SISTEMA</button>
    </div>

    <div id="main-admin" style="display: none;">
        <div class="card" style="display: flex; justify-content: space-around; text-align: center;">
            <div>Inscritos GERAL<br><h2 id="tot-ins">0</h2></div>
            <div>Investidores GERAL<br><h2 id="tot-inv">0</h2></div>
        </div>

        <div class="card">
            <h4>Pesquisar Usuário</h4>
            <input type="text" id="q-user" placeholder="ID ou Contacto">
            <button class="btn-b" onclick="buscarUser()">PESQUISAR</button>
            
            <div id="user-box" style="display:none; margin-top:15px; padding:15px; background:#1e293b; border-radius:10px; border: 1px solid #334155;">
                <p>User: <b id="u-tel" style="color:var(--verde)"></b> | ID: <b id="u-id"></b></p>
                
                <div class="equipa-box">
                    <div>Convidados: <b id="u-ins" style="color:#3b82f6">0</b></div>
                    <div>Investidores: <b id="u-inv" style="color:var(--verde)">0</b></div>
                </div>

                <p>Senha: <b id="u-pass"></b> | Status: <b id="u-status"></b></p>
                <p>IBAN: <b id="u-iban" style="color:#60a5fa"></b></p>
                <p>Saldo: <b id="u-saldo" style="color:yellow"></b></p>
                
                <div class="grid-actions">
                    <button class="btn-v" onclick="alterarSaldo('add')">+ Saldo</button>
                    <button class="btn-r" onclick="alterarSaldo('rem')">- Saldo</button>
                    <button style="background:#f59e0b" onclick="mudarSenha()">Nova Senha</button>
                    <button class="btn-b" id="lock-btn" onclick="bloquear()">Bloquear</button>
                    <button class="btn-r" style="grid-column: span 2;" onclick="deletar()">ELIMINAR CONTA</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h4 style="color:var(--verde)">Solicitações Pendentes</h4>
            <div class="table-container">
                <table>
                    <thead><tr><th>Usuário</th><th>Tipo</th><th>Valor</th><th>Comprovativo</th><th>Ações</th></tr></thead>
                    <tbody id="lista-req"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h4>Lista de Contactos</h4>
            <div class="table-container" style="max-height: 300px;">
                <table>
                    <thead><tr><th>ID</th><th>Contacto</th><th>Saldo</th><th>Status</th></tr></thead>
                    <tbody id="lista-geral"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA03WW6zrf79PsZY6KvaxGRsGFY1AEFCYs", authDomain: "fir-b8708.firebaseapp.com", databaseURL: "https://fir-b8708-default-rtdb.firebaseio.com", projectId: "fir-b8708", storageBucket: "fir-b8708.firebasestorage.app", messagingSenderId: "174524990208", appId: "1:174524990208:web:fa7e5b60d44d4aee98a9e5" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database(); let selUser = null;

    function ntf() { const n = document.getElementById('notif'); n.classList.add('show'); setTimeout(()=>n.classList.remove('show'), 2500); }
    function verImagem(src) { document.getElementById('img-full').src = src; document.getElementById('modal-img').style.display = 'flex'; }
    function fecharModal() { document.getElementById('modal-img').style.display = 'none'; }

    function verificarAcesso() {
        if(document.getElementById('m-key').value === 'ABS..943') {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('main-admin').style.display = 'block';
            carregarDados();
        } else { alert("Chave ABS Incorreta!"); }
    }

    function carregarDados() {
        db.ref('users').on('value', snap => {
            const users = snap.val(); let ti=0, tv=0, hG='', hR='';
            for(let t in users) {
                ti++; if(users[t].inv_eq > 0 || users[t].conv > 0) tv++;
                hG += `<tr><td>${users[t].id}</td><td>${t}</td><td>${(users[t].saldo||0).toFixed(2)}</td><td>${users[t].status||'Ativo'}</td></tr>`;
                (users[t].hR || []).forEach((r, i) => { if(r.s === 'Pendente') hR += `<tr><td>${t}</td><td>DEP</td><td>${r.v} KZ</td><td><img src="${r.img}" class="img-preview" onclick="verImagem('${r.img}')"></td><td><button class="btn-v" onclick="processar('${t}',${i},'hR','Aprovado',${r.v})">V</button><button class="btn-r" onclick="processar('${t}',${i},'hR','Reprovado',0)">X</button></td></tr>`; });
                (users[t].hS || []).forEach((s, i) => { if(s.s === 'Em processamento') hR += `<tr><td>${t}</td><td>SAQUE</td><td>${s.v} KZ</td><td>IBAN: ${s.iban||'---'}</td><td><button class="btn-v" onclick="processar('${t}',${i},'hS','Pago',0)">V</button><button class="btn-r" onclick="processar('${t}',${i},'hS','Reprovado',0)">X</button></td></tr>`; });
            }
            document.getElementById('tot-ins').innerText = ti; document.getElementById('tot-inv').innerText = tv;
            document.getElementById('lista-geral').innerHTML = hG; document.getElementById('lista-req').innerHTML = hR;
        });
    }

    function buscarUser() {
        const q = document.getElementById('q-user').value;
        db.ref('users').once('value', s => {
            const data = s.val();
            for(let t in data) {
                if(t === q || data[t].id == q) {
                    selUser = t; const u = data[t];
                    document.getElementById('u-tel').innerText = t;
                    document.getElementById('u-id').innerText = u.id;
                    document.getElementById('u-ins').innerText = u.ins || 0; // Inscritos da equipa dele
                    document.getElementById('u-inv').innerText = u.inv_eq || 0; // Investidores da equipa dele
                    document.getElementById('u-pass').innerText = u.pass;
                    document.getElementById('u-status').innerText = u.status || "Ativo";
                    document.getElementById('u-iban').innerText = u.lastIban || "---";
                    document.getElementById('u-saldo').innerText = (u.saldo||0).toFixed(2) + " KZ";
                    document.getElementById('user-box').style.display = 'block';
                    return;
                }
            } alert("Usuário não encontrado!");
        });
    }

    function processar(t, i, pasta, status, val) {
        db.ref(`users/${t}`).once('value', s => {
            let u = s.val(); u[pasta][i].s = status;
            let up = { [pasta]: u[pasta] };
            if(status === 'Aprovado') up.saldo = (u.saldo||0) + val;
            db.ref(`users/${t}`).update(up).then(ntf);
        });
    }

    function alterarSaldo(tipo) {
        let v = parseFloat(prompt("Valor:")); if(!v) return;
        db.ref(`users/${selUser}`).once('value', s => {
            let n = tipo === 'add' ? (s.val().saldo||0) + v : (s.val().saldo||0) - v;
            db.ref(`users/${selUser}`).update({saldo: n}).then(()=>{ntf(); buscarUser();});
        });
    }

    function mudarSenha() { let p = prompt("Nova Senha:"); if(p) db.ref(`users/${selUser}`).update({pass:p}).then(()=>{ntf(); buscarUser();}); }
    function bloquear() { db.ref(`users/${selUser}`).update({status: 'Bloqueado'}).then(()=>{ntf(); buscarUser();}); }
    function deletar() { if(confirm("Apagar conta?")) db.ref(`users/${selUser}`).remove().then(()=>{document.getElementById('user-box').style.display='none'; ntf();}); }
</script>
</body>
                        </html>
