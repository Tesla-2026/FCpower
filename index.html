<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chevron VIP | Angola Corporate</title>
    <style>
        :root { --ch-blue: #0054a6; --ch-red: #ed1c24; --success: #28a745; --bg: #f4f7f6; --dark: #1a1a1b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: #333; padding-bottom: 90px; overflow-x: hidden; }

        /* TOAST */
        #toast { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); 
            background: rgba(0,0,0,0.9); color: white; padding: 12px 25px; border-radius: 50px; 
            font-size: 13px; font-weight: 600; z-index: 10000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px; opacity: 0;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* AUTH */
        #authPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #002d5a 0%, var(--ch-blue) 100%); padding: 20px; }
        .auth-card { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: 800; color: #bbb; cursor: pointer; }
        .tab-btn.active { color: var(--ch-blue); border-bottom: 3px solid var(--ch-blue); }
        .btn-main { width: 100%; padding: 15px; background: var(--ch-blue); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        input, select { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 12px; outline: none; font-size: 14px; }

        /* APP */
        #mainApp { display: none; }
        .header-dash { background: var(--ch-blue); color: white; padding: 30px 20px 60px; border-radius: 0 0 30px 30px; text-align: center; }
        .balance-card { background: white; padding: 25px; border-radius: 20px; text-align: center; margin: -50px 15px 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .balance-amount { font-size: 28px; font-weight: 900; color: var(--success); }

        .vip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px; }
        .vip-card { background: white; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #eee; position: relative; }
        .vip-badge { position: absolute; top: 0; left: 0; background: var(--ch-red); color: white; font-size: 10px; padding: 4px 10px; border-radius: 0 0 10px 0; font-weight: bold; }

        /* MODAIS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; max-height: 85vh; overflow-y: auto; }
        .hist-item { background: #f8f9fa; padding: 12px; border-radius: 12px; margin-top: 10px; border-left: 5px solid orange; font-size: 12px; }

        /* NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #a0aec0; font-size: 10px; font-weight: 800; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--ch-blue); }
        .page { display: none; }
        .active-page { display: block; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="toast">🔔 <span>Mensagem</span></div>

    <div id="authPage">
        <div class="auth-card">
            <h2 style="color:var(--ch-blue); margin-bottom:20px;">CHEVRON VIP</h2>
            <div style="display:flex; margin-bottom:20px; border-bottom:1px solid #eee;">
                <button class="tab-btn active" id="btnT1" onclick="setAuth('login')">ENTRAR</button>
                <button class="tab-btn" id="btnT2" onclick="setAuth('reg')">REGISTAR</button>
            </div>
            <input type="number" id="uTel" placeholder="Telemóvel">
            <input type="password" id="uPass" placeholder="Palavra-passe">
            <div id="divRef" class="hidden">
                <input type="number" id="uRef" placeholder="ID de Convite (Opcional)">
            </div>
            <button class="btn-main" id="btnAction" onclick="handleAuth()">ENTRAR AGORA</button>
        </div>
    </div>

    <div id="mainApp">
        <div id="p-home" class="page active-page">
            <div class="header-dash">
                <p style="font-size:10px; opacity:0.8;">ANGOLA CORPORATE UNIT</p>
                <strong id="uID">---</strong>
            </div>
            <div class="balance-card">
                <p style="font-size:11px; font-weight:bold; color:#888;">SALDO DISPONÍVEL (AOA)</p>
                <div class="balance-amount" id="mainSaldo">0,00 Kz</div>
            </div>
            <div class="vip-grid" id="vipGrid"></div>
        </div>

        <div id="p-assets" class="page">
            <div style="padding:20px;">
                <h3 style="color:var(--ch-blue); margin-bottom:15px;">📊 Meus Rendimentos</h3>
                <div id="listAssets"></div>
                <h3 style="color:var(--ch-blue); margin: 25px 0 10px;">🎯 Missão Diária</h3>
                <div id="listMissions"></div>
            </div>
        </div>

        <div id="p-profile" class="page">
            <div style="padding:20px;">
                <button class="btn-main" style="background:white; color:#333; border:1px solid #eee; margin-bottom:12px;" onclick="openM('recharge')">💰 RECARREGAR</button>
                <button class="btn-main" style="background:white; color:#333; border:1px solid #eee; margin-bottom:12px;" onclick="openM('withdraw')">💸 LEVANTAMENTO</button>
                
                <div style="background:#eef6ff; padding:20px; border-radius:15px; border:1px dashed var(--ch-blue); text-align:center; margin-top:10px;">
                    <p style="font-size:11px; color:var(--ch-blue); font-weight:bold;">🎁 BÓNUS DE AFILIADO (10%)</p>
                    <button class="btn-main" style="margin-top:10px; background:var(--ch-blue);" onclick="copiarLink()">🔗 COPIAR LINK DE CONVITE</button>
                </div>

                <button class="btn-main" style="background:var(--ch-red); margin-top:30px;" onclick="location.reload()">SAIR</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="nav('home', this)"><span>🏠</span>INÍCIO</div>
            <div class="nav-item" onclick="nav('assets', this)"><span>🎯</span>MISSÕES</div>
            <div class="nav-item" onclick="nav('profile', this)"><span>👤</span>PERFIL</div>
        </nav>
    </div>

    <div id="m-recharge" class="modal"><div class="modal-content">
        <h3>Recarregar Conta</h3>
        <select id="selBanco">
            <option value="ViaExpress">VIA EXPRESS: 921 054 122</option>
            <option value="BFA">BFA: 0006 0000 2870 9134 3015 1</option>
            <option value="BAI">BAI: 0040 0000 0927 0667 1014 1</option>
        </select>
        <input type="number" id="vRec" placeholder="Valor (Kz)">
        <p style="font-size:11px; margin-bottom:5px;">Anexe o Print:</p>
        <input type="file" id="fInp" accept="image/*">
        <button class="btn-main" onclick="confirmarRecarga()">ENVIAR COMPROVATIVO</button>
        <button class="btn-main" style="background:#888" onclick="closeM()">FECHAR</button>
    </div></div>

    <div id="m-withdraw" class="modal"><div class="modal-content">
        <h3>Solicitar Saque</h3>
        <input type="text" id="wIban" placeholder="IBAN (AO06...)">
        <input type="number" id="wVal" placeholder="Valor (Min 1.500)">
        <button class="btn-main" style="background:var(--success)" onclick="execSacar()">SACAR AGORA</button>
        <h4 style="margin-top:20px; font-size:12px; color:#666; border-bottom:1px solid #eee; padding-bottom:5px;">HISTÓRICO DE SAQUES:</h4>
        <div id="histS" style="margin-top:10px;"></div>
        <button class="btn-main" style="background:#888; margin-top:10px;" onclick="closeM()">VOLTAR</button>
    </div></div>

    <script>
        let meuTel = "";
        let authMode = "login";
        let saldo = 0;
        let ativos = [];
        let saques = [];

        const vips = [
            { n: "VIP 1", p: 12400, l: 520.80 }, 
            { n: "VIP 2", p: 45000, l: 1890.00 },
            { n: "VIP 3", p: 100000, l: 4200.00 }, 
            { n: "VIP 4", p: 250000, l: 10500.00 },
            { n: "VIP 5", p: 500000, l: 21000.00 }, 
            { n: "VIP 6", p: 1000000, l: 42000.00 }
        ];

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has('ref')) {
                setAuth('reg');
                document.getElementById('uRef').value = urlParams.get('ref');
            }
        };

        function notify(msg) {
            const t = document.getElementById('toast');
            t.querySelector('span').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // --- NOVA FUNÇÃO PARA ENVIAR COMPROVANTE ---
        function confirmarRecarga() {
            const valor = document.getElementById('vRec').value;
            const foto = document.getElementById('fInp').files[0];
            
            if(!valor || !foto) return notify("⚠️ Preencha o valor e o print!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const dados = { valor: valor, imagem: e.target.result };
                localStorage.setItem('recarga_env_' + meuTel, JSON.stringify(dados));
                notify("📩 Comprovativo enviado com sucesso!");
                closeM();
            };
            reader.readAsDataURL(foto);
        }

        // RENDIMENTO REAL 24H
        setInterval(() => {
            if(ativos.length > 0 && meuTel) {
                ativos.forEach(a => { 
                    let inc = (a.l / 86400); 
                    saldo += inc; 
                    a.acum += inc; 
                });
                updateUI();
                localStorage.setItem('saldo_'+meuTel, saldo.toFixed(4));
                localStorage.setItem('ativos_'+meuTel, JSON.stringify(ativos));
            }
        }, 1000);

        function handleAuth() {
            const tel = document.getElementById('uTel').value;
            const pass = document.getElementById('uPass').value;
            const ref = document.getElementById('uRef').value;
            if(!tel || !pass) return notify("⚠️ Preencha os campos!");

            if(authMode === "reg") {
                if(localStorage.getItem('user_'+tel)) return notify("❌ Já existe uma conta!");
                localStorage.setItem('user_'+tel, pass);
                localStorage.setItem('saldo_'+tel, "1000.00");
                localStorage.setItem('ativos_'+tel, "[]");
                localStorage.setItem('hist_saques_'+tel, "[]");
                if(ref) localStorage.setItem('padrinho_'+tel, ref);
                notify("✅ Registado! Faça login.");
                setAuth('login');
            } else {
                if(localStorage.getItem('user_'+tel) === pass) {
                    meuTel = tel;
                    saldo = parseFloat(localStorage.getItem('saldo_'+tel) || 1000);
                    ativos = JSON.parse(localStorage.getItem('ativos_'+tel) || "[]");
                    saques = JSON.parse(localStorage.getItem('hist_saques_'+tel) || "[]");
                    document.getElementById('authPage').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    document.getElementById('uID').innerText = "+244 " + tel;
                    renderVips(); updateUI(); notify("💎 Bem-vindo!");
                } else { notify("❌ Dados incorretos!"); }
            }
        }

        function comprar(i) {
            if(saldo >= vips[i].p) {
                saldo -= vips[i].p;
                ativos.push({ ...vips[i], acum: 0 });
                
                let pad = localStorage.getItem('padrinho_'+meuTel);
                if(pad) {
                    let com = vips[i].p * 0.10;
                    let sPad = parseFloat(localStorage.getItem('saldo_'+pad) || 0);
                    localStorage.setItem('saldo_'+pad, (sPad + com).toFixed(2));
                }

                localStorage.setItem('ativos_'+meuTel, JSON.stringify(ativos));
                localStorage.setItem('saldo_'+meuTel, saldo.toFixed(2));
                updateUI(); notify("✅ VIP Ativado!");
            } else { notify("❌ Saldo insuficiente!"); }
        }

        function renderVips() {
            document.getElementById('vipGrid').innerHTML = vips.map((v, i) => `
                <div class="vip-card">
                    <div class="vip-badge">${v.n}</div>
                    <strong style="color:var(--ch-blue); display:block; margin:8px 0;">Custo: ${v.p.toLocaleString()} Kz</strong>
                    <div style="background:#f0f7ff; padding:5px; border-radius:8px; margin-bottom:10px;">
                        <span style="font-size:11px; color:#555; display:block;">Rendimento Diário:</span>
                        <strong style="font-size:13px; color:var(--success);">${v.l.toLocaleString()} Kz</strong>
                    </div>
                    <button class="btn-main" style="padding:10px; font-size:11px; margin-top:0;" onclick="comprar(${i})">ATIVAR AGORA</button>
                </div>`).join('');
        }

        function renderAssets() {
            document.getElementById('listAssets').innerHTML = ativos.map(a => `
                <div class="hist-item" style="border-left-color:var(--success)">
                    <strong>${a.n} (Rendimento 24h)</strong><br>
                    <span style="color:var(--success); font-size:16px; font-weight:800;">+ ${a.acum.toFixed(4)} Kz</span>
                </div>`).join('') || "Sem ativos.";
            
            document.getElementById('listMissions').innerHTML = `
                <div style="background:white; padding:15px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; border:1px solid #eee;">
                    <div>Check-in Diário<br><small>+ 50 Kz Grátis</small></div>
                    <button class="btn-main" style="width:90px; margin:0; padding:10px" onclick="checkin()">COLETAR</button>
                </div>`;
        }

        function checkin() {
            let hoje = new Date().toLocaleDateString();
            if(localStorage.getItem('lc_'+meuTel) === hoje) return notify("⏳ Já coletou hoje!");
            saldo += 50; localStorage.setItem('lc_'+meuTel, hoje); updateUI(); renderAssets(); notify("🎯 +50 Kz!");
        }

        function execSacar() {
            let v = parseFloat(document.getElementById('wVal').value);
            let ib = document.getElementById('wIban').value;
            if(v < 1500 || v > saldo || !ib) return notify("❌ Valor ou IBAN inválido!");
            
            saldo -= v;
            const agora = new Date();
            const dataStr = agora.toLocaleDateString('pt-AO') + " " + agora.toLocaleTimeString('pt-AO', {hour:'2-digit', minute:'2-digit'});
            
            saques.unshift({valor: v*0.9, data: dataStr, status: "Pendente"});
            localStorage.setItem('hist_saques_'+meuTel, JSON.stringify(saques));
            localStorage.setItem('saldo_'+meuTel, saldo.toFixed(2));
            localStorage.setItem('iban_'+meuTel, ib); // Salva o IBAN para o Admin
            updateUI(); updateHist(); notify("💸 Saque solicitado!");
        }

        function updateHist() {
            document.getElementById('histS').innerHTML = saques.map(s => `
                <div class="hist-item">
                    <div style="display:flex; justify-content:space-between">
                        <strong>${s.valor.toLocaleString()} Kz</strong>
                        <span style="font-size:10px; color:#999">${s.data}</span>
                    </div>
                    <div style="color:orange; font-weight:bold; margin-top:5px">Estado: ${s.status}</div>
                </div>`).join('') || "Sem registos.";
        }

        function copiarLink() {
            const link = window.location.origin + window.location.pathname + "?ref=" + meuTel;
            navigator.clipboard.writeText(link).then(() => notify("🔗 Link copiado!"));
        }

        function updateUI() { 
            document.getElementById('mainSaldo').innerText = saldo.toLocaleString('pt-AO', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " Kz"; 
        }

        function nav(p, e) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
            e.classList.add('active'); document.getElementById('p-' + p).classList.add('active-page');
            if(p === 'assets') renderAssets();
            if(p === 'profile') updateHist();
        }

        function setAuth(m) {
            authMode = m;
            document.getElementById('btnT1').classList.toggle('active', m==='login');
            document.getElementById('btnT2').classList.toggle('active', m==='reg');
            document.getElementById('divRef').classList.toggle('hidden', m==='login');
            document.getElementById('btnAction').innerText = m==='login' ? "ENTRAR AGORA" : "CRIAR CONTA";
        }

        function openM(id) { document.getElementById('m-' + id).style.display = 'flex'; if(id==='withdraw') updateHist(); }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
                        </html>
